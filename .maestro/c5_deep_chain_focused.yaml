# Section C — checks 7 + 8 (DEEP dimension): the 20-level alternating
# mari/test-aggregator reply chain on the "QA deep chain fixture" post
# (permanent seed:
# at://did:plc:7qijxb47zixbu3xqgdmruaui/social.coves.community.post/3mr2pxaxgq422).
#
# Verifies:
# - "Load more replies" under "chain depth 01" continues the chain (the
#   real depth-02 child sits past the sibling cap behind 6 deleted
#   tombstones — regression for the dead load-more button fixed
#   2026-07-20 via parentRkey subtree fetch),
# - nesting renders in correct order through depth 10 (the API fetch-depth
#   boundary) and on to depth 20 (max), with no overflow,
# - the focused thread screen ("Read N more replies") roots the subtree at
#   the tapped comment, shows dimmed ancestors + highlighted anchor, and
#   chains deeper focused screens to the chain tail,
# - back from the focused stack returns to the post detail.
#
# The flow first exhausts the WIDE parent's load-more so that the only
# remaining "Load more replies" button belongs to "chain depth 01"
# (index-0 tap stays unambiguous).
# Assumes a signed-in session (suite order: after c4).
appId: social.coves.dev
---
- launchApp:
    stopApp: true
- extendedWaitUntil:
    visible: "Discover feed.*"
    timeout: 30000
- extendedWaitUntil:
    visible: "Feed post in [\\s\\S]*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Feed post in [\\s\\S]*QA deep chain fixture[\\s\\S]*"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "Feed post in [\\s\\S]*QA deep chain fixture[\\s\\S]*"
    index: 0
- extendedWaitUntil:
    visible: "QA deep chain fixture[\\s\\S]*"
    timeout: 15000
# --- Exhaust the WIDE parent's load-more first (disambiguation) ---
- scrollUntilVisible:
    element:
      text: "[\\s\\S]*wide reply 06 of 7[\\s\\S]*"
    direction: DOWN
    timeout: 60000
    centerElement: true
- tapOn:
    text: "Load more replies"
    index: 0
- extendedWaitUntil:
    visible: "[\\s\\S]*wide reply 02 of 7[\\s\\S]*"
    timeout: 20000
# --- Chain depth 01: load-more continues the chain past the tombstones ---
- scrollUntilVisible:
    element:
      text: "[\\s\\S]*chain depth 01 \\(mari\\)[\\s\\S]*"
    direction: DOWN
    timeout: 60000
    centerElement: true
- scrollUntilVisible:
    element:
      text: "Load more replies"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "Load more replies"
    index: 0
- extendedWaitUntil:
    visible: "[\\s\\S]*chain depth 02 \\(agg\\)[\\s\\S]*"
    timeout: 20000
- takeScreenshot: build/maestro/c5_chain_loaded
# Nesting renders in order to the render cap, then continues via the
# focused thread screen
- scrollUntilVisible:
    element:
      text: "[\\s\\S]*chain depth 07 \\(mari\\)[\\s\\S]*"
    direction: DOWN
    timeout: 60000
- scrollUntilVisible:
    element:
      text: "Read 1 more reply"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "Read 1 more reply"
    index: 0
# --- Focused screen 1: anchor 07, replies 08..13 (depth 10 included) ---
- extendedWaitUntil:
    visible: "[\\s\\S]*chain depth 08 \\(agg\\)[\\s\\S]*"
    timeout: 20000
# Depth 10 — the API fetch-depth boundary — renders inside the subtree
- scrollUntilVisible:
    element:
      text: "[\\s\\S]*chain depth 10 \\(agg\\)[\\s\\S]*"
    direction: DOWN
    timeout: 30000
- takeScreenshot: build/maestro/c5_focused_depth10
- scrollUntilVisible:
    element:
      text: "[\\s\\S]*chain depth 13 \\(mari\\)[\\s\\S]*"
    direction: DOWN
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Read 1 more reply"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "Read 1 more reply"
    index: 0
# --- Focused screen 2: continues 14..19 ---
- extendedWaitUntil:
    visible: "[\\s\\S]*chain depth 14 \\(agg\\)[\\s\\S]*"
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "[\\s\\S]*chain depth 19 \\(mari\\)[\\s\\S]*"
    direction: DOWN
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Read 1 more reply"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "Read 1 more reply"
    index: 0
# --- Focused screen 3: the chain tail (depth 20) ---
- extendedWaitUntil:
    visible: "[\\s\\S]*chain depth 20 \\(agg\\)[\\s\\S]*"
    timeout: 20000
- takeScreenshot: build/maestro/c5_chain_tail
# --- Back through the focused stack to the post detail ---
- back
- extendedWaitUntil:
    visible: "[\\s\\S]*chain depth 19 \\(mari\\)[\\s\\S]*"
    timeout: 15000
- back
- extendedWaitUntil:
    visible: "[\\s\\S]*chain depth 13 \\(mari\\)[\\s\\S]*"
    timeout: 15000
- back
# Back on the post detail at the previous position (deep in the chain) —
# the chain is still rendered; scroll up to prove we're on the right post.
- extendedWaitUntil:
    visible: "[\\s\\S]*chain depth 0[0-9] \\((mari|agg)\\)[\\s\\S]*"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "QA deep chain fixture[\\s\\S]*"
    direction: UP
    timeout: 60000
- takeScreenshot: build/maestro/c5_back_on_detail
- back
