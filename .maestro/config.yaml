# Maestro workspace config for the QA loop regression suite.
# Flows are stateful (login/signout) — run them in this order.
# Section B, C and D flows require a signed-in session, so they run after
# a1_login_session (which ends signed in) and before a2_signout_landing.
# c3 additionally depends on comments seeded by c2.
# d4_discovery_guest requires a signed-OUT state (the admin test account
# sees the admin panel instead of the discovery screen), so it runs after
# a2_signout_landing.
# f4_avatar_gallery requires an image in the emulator gallery (see the
# prerequisite adb push recipe in that flow's header comment).
# f5_empty_profile is NOT in the order: it needs an adb-fired deep link
# first (MainActivity has no VIEW intent filter) — see its header comment.
# h1_video_post needs emulator internet access and a live Streamable clip
# (see its header); it seeds one video post per run, like e1 does.
# g1_legal_gates is NOT in the order: it launches with clearState (fresh
# install), wiping the legal acceptances AND the signed-in session every
# stateful flow depends on. Run it standalone, then a1_login_session —
# see its header comment.
executionOrder:
  continueOnFailure: false
  flowsOrder:
    - a1_login_session
    - b1_feed_loads
    - b2_feed_scroll
    - b3_refresh_pagination
    - b4_vote_toggle
    - b5_tab_state_retention
    - c1_post_detail
    - c2_comment_reply_collapse
    - c3_comment_vote_sort
    - d1_admin_panel
    - d2_community_from_chip
    - d3_join_leave
    - e1_create_post
    - e2_compose_validation
    - e3_community_picker
    - e4_reply_draft
    - e5_kill_mid_compose
    - f1_own_profile
    - f2_author_profile
    - f3_edit_profile_persist
    - f4_avatar_gallery
    - g3_report_dialog
    - h1_video_post
    - h2_rich_text_linkbars
    - a2_signout_landing
    - d4_discovery_guest
    - a3_wrong_password
