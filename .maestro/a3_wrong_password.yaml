# Section A — check 4: a wrong password fails gracefully (clear error on the
# PDS page, no crash) and cancelling returns to the app's login screen with a
# friendly error. PRECONDITION: app signed out (run after
# a2_signout_landing). Leaves the app signed out.
appId: social.coves.dev
---
- launchApp
- extendedWaitUntil:
    visible: "Sign in"
    timeout: 30000
- tapOn: "Sign in"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 15000
- tapOn: "alice.bsky.social"
- inputText: "mari.local.coves.dev"
- hideKeyboard
- tapOn: "Sign in"
# Chrome custom tab: PDS OAuth password page
- extendedWaitUntil:
    visible: "Password"
    timeout: 30000
- tapOn: "Password"
- inputText: "definitely-wrong-password"
- hideKeyboard
- tapOn:
    text: "Sign in"
    index: 1
# Graceful error on the PDS page, form still usable (retry possible)
- extendedWaitUntil:
    visible: "Wrong identifier or password"
    timeout: 30000
- assertVisible: "Password"
# Cancel: the backend currently renders a raw "OAuth callback failed" page in
# the tab instead of redirecting back to the app (known backend issue), so
# close the tab manually and confirm the app survived without a crash.
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "OAuth callback failed.*"
    timeout: 30000
- tapOn: "Close tab"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 30000
- takeScreenshot: build/maestro/a_wrong_password
